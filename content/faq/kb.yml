categories:
- category: "General"
  faqs:
    - question: "Can I have more than one campaign?"
      answer: |
        We get this question a lot and the answer is yes, of course! There is no limit to how many campaign you can own or join. 
        
        To switch or create a new campaign, click on **<i class="fa-regular fa-grid" aria-hidden="true"></i> campaign switcher** icon on the top-right of any page inside of Kanka. Below your campaigns, you'll find is a **New Campaign** link.
    - question: "Can I create custom categories?"
      answer: |
        Kanka comes with a set of predefined categories that interact with each other, but we understand the need for finer organization. This is why [premium campaigns](/premium) can currently create up to 5 [custom categories](https://docs.kanka.io/en/latest/features/campaigns/modules.html).
    - question: "Can a campaign be duplicated?"
      answer: |
        Absolutely! Campaigns can be duplicated by generating a whole [campaign export](https://docs.kanka.io/en/latest/features/campaigns/export.html), and then importing that export into a new campaign.
    - question: "How do I link my world together?"
      answer: |
        Creating references and links to other entities of the campaign is a core feature of Kanka. When writing a description, type `@` followed by at least 3 characters to get a list of entities.
        
        To learn how to change the entity's name in the mention, how to link to an entity's subpage, or how to filter search results, [head over to our documentation](https://docs.kanka.io/en/latest/features/mentions.html).
    - question: "How can I back up or export my campaign?"
      answer: |
        Once a day, you can export all of your campaign's data as a ZIP file. Contents can either be JSON or markdown files.
        
        Learn how to export your campaign [in our documentation](https://docs.kanka.io/en/latest/features/campaigns/export.html).
    - question: "What are Pins?"
      answer: |
        Relations and attributes can be pinned to the right of their entity's overview. To pin an element, go and edit the relation or attributes and set the pinned value on those.
        
        You can find out more about this feature in [our documentation](https://docs.kanka.io/en/latest/features/profile-sidebar.html).
    - question: "Can I rename categories? For example Families into Clans, or Organisations into Factions?"
      answer: |
        Absolutely! We know that naming is important for setting theme and tone of a world, so categories in [premium campaigns](/premium) can easily be renamed in **Settings** > **Categories** and clicking on the edit button next to the category name.
        
        [Learn more about this feature in the docs.](https://docs.kanka.io/en/latest/features/campaigns/modules.html)
    - question: "Can I sync content across multiple campaigns?"
      answer: |
        Kanka does not have this feature. However, if you're trying to have multiple play groups in the same world consider using the same campaign and separating your groups through a combination of quests, tags, and permissions.
        
        Alternatively, you can copy one or multiple entities from one campaign to another using the [bulk transform](https://docs.kanka.io/en/latest/guides/bulk.html) action.
    - question: "How can I run multiple groups in the same world?"
      answer: |
        Rather than re-creating your world multiple times in Kanka, manage everything in a single campaign instead. Invite each member of your groups, and instead of giving them all the players role, create multiple roles. That way you can control which group sees what in the campaign.
        
        Another good practice is to create a tag for each of your groups, so you can quickly filter entities based on specific tags.
    - question: "How do I use filters?"
      answer: |
        You can use filters to limit the amount of results shown in lists. Text fields support various options to control in further detail what is filtered out.
        
        * `!...` By placing an `!` before your text, you can search for anything that doesn't contain the text in the field.
        * `...!` By placing an `!`at the end of your text, you can search for every entity with exactly this text in the field.
        * `!!`Writing `!!` in a field will search for all entities where this field is empty.
        
        You can combine search options on text fields by writing `;`. For example `Alex;!Smith`.
        
        Filters and ordered columns set for an entity list are saved into your session, so as long as you stay connected you don't need to re-set them on every page.
        
        When filters are active, the copy to clipboard button becomes active. This copies the filters to your clipboard, and you can use those for dashboard widget filters or for quick link filters.
    - question: "Can I change nested lists to flat lists?"
      answer: |
        Determining if lists are presented in a nested or flat manner can be controlled in either the campaign settings or the user settings, with the campaign settings always overriding the user's setup.
        
        Learn how to change these settings [in our documentation](https://docs.kanka.io/en/latest/features/nested.html).
    - question: "What are property kits"
      answer: |
        The best way we can explain Property kits is with an example. Let's imagine that your world has lots of Locations, and on many of those locations, you want to remember to create a custom property for "Population", "Climate", "Crime Level".
        
        Now, you could easily do that on every Location, but it can get tedious, and you might forget sometimes to create the property "Crime Level". This is where Property Kits come into play.
        
        You can create a kit with those properties (Population, Climate, Crime Level, etc), and later apply that template to your locations. This will create the properties from the kit on the locations, so all you have to do is change the values and not have to remember about the properties!
        
        [Our YouTube video covering this](https://www.youtube.com/watch?v=qKnTpuePqUA)
- category: "Worldbuilding"
  faqs:
    - question: "Where do I create Gods and religions?"
      answer: |
        We recommend creating Gods as [characters](https://docs.kanka.io/en/latest/entities/characters.html), and creating religions as [organisations](https://docs.kanka.io/en/latest/entities/organisations.html). If you want to quickly find your deities, we recommend tagging them with an appropriate [tag](https://docs.kanka.io/en/latest/entities/tags.html) and/or type combine them with a [bookmark](https://docs.kanka.io/en/latest/advanced/bookmarks.html).
        
        Or if you don't want to mix and match, you can create a [custom category](https://docs.kanka.io/en/latest/features/campaigns/modules.html) for them.
    - question: "Where do I keep track of my classes like Ranger or Cleric?"
      answer: |
        We recommend creating RPG classes as Abilities, and then creating those classes' abilities as sub-abilities.
    - question: "What are Attributes?"
      answer: |
        Use attributes to represent values attached to an entity that aren't text. You can reference entities in attributes using the advanced mentions syntax `[entity:id]`. You can also reference other attributes by using the `{Level}` syntax.
        
        You can also get creative with some basic math options. For example, `{Level}*{Con}` will multiplay the `:level` and `:con` attributes of this entity. If you want to round up or down, you can use `floor({Level}/3)` or `ceil(({Con}*{Level})/2)`
        
        When creating or editing an attribute template, you can set random attributes. This can either be a random value between two numbers separated by `-`, or a random value from a list of values separated by `,`. The value for the attribute is determined when the template is applied to an entity, or when an entity is saved.
        
        For example, if you want a number between 1 and 100, use `1-100`. If you want a value from a list of options, use `London, Berlin, Rome, Zürich`.
        
        You can reference the entity's name with `{name}`. If an attribute exists with that name, the attribute will be used instead.
    - question: "Can I copy entities across worlds?"
      answer: |
        Absolutely! You can even copy entities from any campaign you have access to (including public campaigns) into yours. Either do it individually from the entity's "..." action menu,  or [in bulk](https://docs.kanka.io/en/latest/guides/bulk.html).
- category: "Permissions"
  faqs:
    - question: "Can I limit the information my players see in my campaign?"
      answer: |
        Absolutely, this is why we built Kanka! You can invite all your players to your campaigns, and give them roles and permissions. We built the system to be extremely flexible (you can both use an opt-in and opt-out configuration) to cover as many needs and situations as possible.
        
        If you only want parts of an entity to be private, for example their goals and plot points, add a `Post` in the entity's overview page.
        
        [Video Explanation](https://www.youtube.com/watch?v=ikNPzNgjYmg&feature=emb_logo)
    - question: "Can anyone see my world?"
      answer: |
        Only the people that you invite to your campaign can see and interact with that you have created. This is also true for employees of Kanka, meaning that we cannot access your data unless invited to join your campaign. Your data is private and always in your control. If you wish to share your campaign with a larger audience, you can make it public, allowing anyone to view its content.
- category: "Calendars"
  faqs:
    - question: "How do character ages and death dates work?"
      answer: |
        You can link a Character to a calendar of the campaign by viewing a Character and going to the Reminders subpage. From there, add a new reminder and set the type to Birth or Death to automatically calculate the character's age. If both birth and death are present, both dates will be shown as well as the age at death. If only the birth is set, the date and the current age will be shown. If only the death is set, the date and the years since death will be shown.
        
        Locations and organisations also get their own "Foundation" reminder type.
        
        [Learn more about this feature in the docs.](https://docs.kanka.io/en/latest/advanced/age.html?highlight=sidebar)
- category: "Maps & Locations"
  faqs:
    - question: "Can I upload maps to Kanka?"
      answer: |
        The **maps** category supports PNG, JPG, WEBP and SVG images. These maps can have layers, groups, and markers pointing of various shapes and sizes that point to other entities in a campaign.
        
        You can learn more about the maps category [in our documentation](https://docs.kanka.io/en/latest/entities/maps.html).
    - question: "What can I do with Maps?"
      answer: |
        Using the maps category, you can create new maps to your campaign. Maps can have layers, groups, and markers. Markers can be individual elements on the map, or linked to entities of the campaign, creating a visual exploration experience to campaigns. Markers can also be made private, and have different rendering options (pin, circle, label, custom polygon).
        
        [Learn more about maps in our documentation](https://docs.kanka.io/en/latest/entities/maps.html).
- category: "Account"
  faqs:
    - question: "How can I delete my account?"
      answer: |
        To delete your account, go to your [Account](https://app.kanka.io/settings/account#account-deletion) page and scroll down to the account deletion section. This will **permanently** delete your account and any campaigns where you are the sole member. This action is permanent and cannot be reverted by Kanka.
    - question: "How can I delete a campaign?"
      answer: |
        From the sidebar, click on **Settings**, then **Deletion** at the bottom of the sidebar. Deleting a campaign is a **permanent** action that will delete all the data stored on our servers, including images. Recovering a deleted campaign is not possible.
    - question: "How do I link my Kanka account with Discord?"
      answer: |
        Linking of a Kanka account to [Discord](/go/discord) is done on the [Apps](/settings/apps) setting page and by clicking on `Connect`. This will add you to the Kanka discord, and sync your subscription roles.
- category: "Pricing"
  faqs:
    - question: "Will the app stay free?"
      answer: |
        Yes! We strongly believe that your financial situation shouldn't impact your enjoyment of TTRPGs or world building and we will always keep the core app free. However, if you wish to take a more active role in this journey, support us, and vote on the features that matter the most to you, you can do so through our subscriptions.
        
        In addition to voting on the direction that Kanka takes, supporting us allows you to gain access to [Premium campaigns](/premium), increase file size upload limits, an ad-free experience, and more.
    - question: "What are early access features?"
      answer: |
        Early access features is a way for us to reward our amazing subscribers by giving them an exclusive 30 day period where they can try out the latest features before anyone else.
    - question: "What happens if premium features are removed from a campaign?"
      answer: |
        Removing premium features from a campaign doesn't delete any of the data that was created while upgraded, but simply hides the information and features that require a premium campaign. All the information and features will be available again with the same setup as they were when a campaign is upgraded once more.
    - question: "Do you have access to my credit card details?"
      answer: |
        All credit card information and billing is handled by [Stripe](https://stripe.com). Stripe only provides us with your card brand, expiry date, and last four digits. This allows us to notify subscribers when their card is about to expire, avoiding them loss of subscription status and premium campaigns.
- category: "Other"
  faqs:
    - question: "Is there a mobile app?"
      answer: |
        There currently is no dedicated mobile app for Kanka, but we've taken extra steps to ensure that all feature work on mobile devices and that the interface adapts to smaller screen sizes.
    - question: "What are the long-term plans?"
      answer: |
        The long-term plan for Kanka is to build a versatile worldbuilding and campaign management tool that is system agnostic with community created content through the [plugins library](https://plugins.kanka.io).
    - question: "How often is the data on Kanka backed up?"
      answer: |
        We perform two backups a day to prevent any data loss. Our own campaigns are on the server, so we don’t want to take any risks!
    - question: "How can I report a bug?"
      answer: |
        Simply join our [Discord](/go/discord) server and report your bug in the `#error-and-bugs` channel.
    - question: "How can I help?"
      answer: |
        Firstly, thank you for wanting to help out! We are always interested in people who can help out with translations, testing new features, or who can help out new users. We also love when people promote Kanka to reach new users in places we hadn't thought of. Your best course of action is to join us on the [Discord](/go/discord) where a channel is dedicated to helping out.
