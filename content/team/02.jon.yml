name: Jon
role: Co-Founder & Business Manager
image: https://th.kanka.io/qj6BEWMKrn4D-9f5GMP_REpzsyQ=/200x200/smart/src/app/team/jon.jpg
experience: Will only play as a Fighter

bio:
   - I didn't come to Kanka from worldbuilding. I came from a world of rigid processes, entitled clients, and very little sense of purpose. I saw what Jay had built, saw the potential, and talked him into turning it into our main jobs. Kanka was an opportunity, but the passion came later.
   - "What changed me was the people. Early on I noticed something I'd never experienced professionally: users who were loyal, kind, and genuinely forgiving when things weren't perfect. Then I started discovering their creativity through our worldbuilding challenges, and honestly, I just thought it was really cool. Entire worlds with their own histories, languages, conflicts, all built with so much care. All that lives rent free in my head."
   - These days I handle the storytelling side of Kanka, figuring out how to explain what we do and why it matters. I think who you build for shapes everything, and we got lucky with the people who showed up.
   - When I'm not working, I cook with whatever my hydroponic setup decides to produce (it's getting out of hand), play too many video games, and later this year I'll be a first-time parent, which I suspect will cut into all of the above.