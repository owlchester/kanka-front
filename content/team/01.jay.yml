bio:
  - I started Kanka because I got tired of spending half my worldbuilding time updating wiki software and the other half actually creating. Seven years later, I'm still here, still shipping, still obsessed with getting the balance right between depth and simplicity. Good tools don't need to do everything, just the things that matter, and they need to do them well.
  - I build Kanka with technology that isn't shiny, but that I know works and won't wake me up at 3am because something broke. I spend the rest of my time staying active, reading, raising a toddler, and dreaming up worlds."
  - I think personally interesting problems that serve real users stick with you longer than obligation ever will. I want Kanka around in 10 years. That means shipping carefully and with attention to detail, and keeping technical debt from sucking the passion out of it. Some days that's harder than others.
